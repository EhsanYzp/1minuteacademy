<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="55%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0B1220" />
    </linearGradient>

    <radialGradient id="faceGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#EEF2F7" />
    </radialGradient>

    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0B1220" flood-opacity="0.18" />
    </filter>

    <filter id="capShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#0B1220" flood-opacity="0.22" />
    </filter>
  </defs>

  <!-- Clock -->
  <g filter="url(#softShadow)">
    <!-- Outer rim -->
    <circle cx="256" cy="296" r="176" fill="url(#rimGrad)" />
    <circle cx="256" cy="296" r="168" fill="none" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="4" />

    <!-- Face -->
    <circle cx="256" cy="296" r="156" fill="url(#faceGrad)" />
    <circle cx="256" cy="296" r="140" fill="none" stroke="#CBD5E1" stroke-opacity="0.55" stroke-width="2" />

    <!-- Ticks (clean + minimal) -->
    <g stroke-linecap="round" fill="none">
      <!-- Major ticks -->
      <g stroke="#0F172A" stroke-width="8">
        <line x1="256" y1="146" x2="256" y2="170" />
        <line x1="406" y1="296" x2="382" y2="296" />
        <line x1="256" y1="446" x2="256" y2="422" />
        <line x1="106" y1="296" x2="130" y2="296" />
      </g>

      <!-- Minor hour ticks -->
      <g stroke="#1E293B" stroke-opacity="0.55" stroke-width="6">
        <!-- 1,2 -->
        <g transform="rotate(30 256 296)">
          <line x1="256" y1="152" x2="256" y2="170" />
        </g>
        <g transform="rotate(60 256 296)">
          <line x1="256" y1="152" x2="256" y2="170" />
        </g>
        <!-- 4,5 -->
        <g transform="rotate(120 256 296)">
          <line x1="256" y1="152" x2="256" y2="170" />
        </g>
        <g transform="rotate(150 256 296)">
          <line x1="256" y1="152" x2="256" y2="170" />
        </g>
        <!-- 7,8 -->
        <g transform="rotate(210 256 296)">
          <line x1="256" y1="152" x2="256" y2="170" />
        </g>
        <g transform="rotate(240 256 296)">
          <line x1="256" y1="152" x2="256" y2="170" />
        </g>
        <!-- 10,11 -->
        <g transform="rotate(300 256 296)">
          <line x1="256" y1="152" x2="256" y2="170" />
        </g>
        <g transform="rotate(330 256 296)">
          <line x1="256" y1="152" x2="256" y2="170" />
        </g>
      </g>
    </g>

    <!-- Hands (set to ~1:00 for "1") -->
    <!-- Minute hand -->
    <path d="M256 296 L256 176" stroke="#0F172A" stroke-width="10" stroke-linecap="round" />
    <path d="M256 296 L256 190" stroke="#1E293B" stroke-opacity="0.15" stroke-width="14" stroke-linecap="round" />

    <!-- Hour hand -->
    <g transform="rotate(30 256 296)">
      <path d="M256 306 L256 224" stroke="url(#accentGrad)" stroke-width="12" stroke-linecap="round" />
      <path d="M256 306 L256 238" stroke="#0B1220" stroke-opacity="0.12" stroke-width="18" stroke-linecap="round" />
    </g>

    <!-- Hub -->
    <circle cx="256" cy="296" r="14" fill="url(#accentGrad)" />
    <circle cx="256" cy="296" r="7" fill="#FFFFFF" />
  </g>

  <!-- Graduation cap (better placement + proportions) -->
  <g filter="url(#capShadow)">
    <!-- Board: sits just above the rim with a slight overlap -->
    <polygon points="256,52 378,94 256,132 134,94" fill="url(#capGrad)" />
    <polygon points="256,58 370,96 256,130 142,96" fill="#64748B" opacity="0.22" />

    <!-- Crown/base -->
    <path d="M224 96 H288 V122 C288 130 282 136 274 136 H238 C230 136 224 130 224 122 Z" fill="url(#capGrad)" />
    <path d="M232 102 H280" stroke="#94A3B8" stroke-opacity="0.28" stroke-width="4" stroke-linecap="round" />

    <!-- Button -->
    <circle cx="256" cy="52" r="8" fill="url(#accentGrad)" />

    <!-- Tassel: anchored on the right, hangs down over the clock rim -->
    <path d="M260,52 C292,56 318,78 330,98 C338,112 336,132 326,152" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" />
    <path d="M326,150 L318,178 L326,182 L334,178 Z" fill="url(#accentGrad)" />
    <rect x="318" y="178" width="16" height="4" rx="2" fill="#4F46E5" opacity="0.55" />
  </g>
</svg>
